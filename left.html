    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }

        /* ── Dark background ── */
        .section-bg {
            background-color: #0D1117;
            position: relative;
            overflow: hidden;
        }

        .section-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        .section-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 50%, rgba(122, 21, 21, 0.16) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 50%, rgba(201, 151, 58, 0.09) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(201, 151, 58, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        /* Gold corners */
        .corner-tl {
            position: absolute;
            top: 0;
            left: 0;
            width: 180px;
            height: 180px;
            border-top: 2px solid rgba(201, 151, 58, 0.45);
            border-left: 2px solid rgba(201, 151, 58, 0.45);
            pointer-events: none;
            z-index: 1;
        }

        .corner-br {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 180px;
            height: 180px;
            border-bottom: 2px solid rgba(201, 151, 58, 0.45);
            border-right: 2px solid rgba(201, 151, 58, 0.45);
            pointer-events: none;
            z-index: 1;
        }

        .gold-stripe {
            position: absolute;
            top: -60px;
            right: 80px;
            width: 3px;
            height: calc(100% + 120px);
            background: linear-gradient(180deg, transparent, rgba(201, 151, 58, 0.22), transparent);
            transform: rotate(12deg);
            pointer-events: none;
            z-index: 1;
        }

        /* ══════════════════════════════════
       LEAF BADGE — UNIFORM 220×220 matching reference
    ══════════════════════════════════ */
        .leaf-badge {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .leaf-badge .leaf-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.55)) brightness(1.05);
        }

        /* Uniform inner circle — same for every badge */
        .leaf-badge .logo-inner {
            position: relative;
            z-index: 2;
            width: 118px;
            height: 118px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-shadow:
                0 0 0 4px rgba(201, 151, 58, 0.45),
                0 10px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 3px rgba(255, 255, 255, 0.95);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .leaf-badge:hover .logo-inner {
            transform: scale(1.08);
            box-shadow:
                0 0 0 4px rgba(201, 151, 58, 0.9),
                0 16px 40px rgba(0, 0, 0, 0.7),
                inset 0 1px 3px rgba(255, 255, 255, 1);
        }

        .leaf-badge .logo-inner img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Card hover */
        .acc-item {
            transition: transform 0.3s ease;
            cursor: default;
        }

        .acc-item:hover {
            transform: translateY(-8px);
        }

        /* ══════════════════════════════════
       SLIDE GRID
       Mobile  : 2 cols
       ≥640px  : 3 cols
       ≥1024px : 5 cols
    ══════════════════════════════════ */
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(2, 220px);
            justify-content: center;
            gap: 1rem;
        }

        @media (min-width: 640px) {
            .logo-grid {
                grid-template-columns: repeat(3, 220px);
                gap: 1.25rem;
            }
        }

        @media (min-width: 1024px) {
            .logo-grid {
                grid-template-columns: repeat(5, 220px);
                gap: 1.5rem;
            }
        }

        /* Slider */
        .slider-track {
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
        }

        .slide {
            flex-shrink: 0;
            width: 100%;
        }

        /* Dots */
        .dot {
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .dot.active {
            background: #C9973A !important;
            width: 24px !important;
            border-radius: 4px !important;
        }

        /* GSAP init */
        .js-hero {
            opacity: 0;
            transform: translateY(24px);
        }

        .js-item {
            opacity: 0;
            transform: translateY(30px);
        }

        .js-dots {
            opacity: 0;
        }
    </style>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        const st = { trigger: 'section', start: 'top 78%', once: true };

        gsap.to('.js-hero', { opacity: 1, y: 0, duration: 0.9, ease: 'power3.out', scrollTrigger: st });
        gsap.to('.js-dots', { opacity: 1, duration: 0.6, delay: 0.7, scrollTrigger: st });
        gsap.utils.toArray('.js-item').forEach((el, i) => {
            gsap.to(el, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', delay: i * 0.12 + 0.35, scrollTrigger: st });
        });

        let current = 0;
        const total = 4;
        const track = document.getElementById('sliderTrack');

        function goToSlide(n) {
            current = n;
            track.style.transform = `translateX(-${n * 100}%)`;

            // Update dots
            for (let i = 0; i < total; i++) {
                const d = document.getElementById(`dot${i}`);
                if (i === n) {
                    d.classList.add('active');
                    d.style.background = '#C9973A';
                    d.style.width = '24px';
                    d.style.borderRadius = '4px';
                } else {
                    d.classList.remove('active');
                    d.style.background = 'rgba(255,255,255,0.2)';
                    d.style.width = '10px';
                    d.style.borderRadius = '50%';
                }
            }

            // Stagger animate incoming cards
            const items = track.querySelectorAll(`.slide:nth-child(${n + 1}) .acc-item`);
            items.forEach((el, i) => {
                el.style.opacity = 0;
                el.style.transform = 'translateY(24px)';
                setTimeout(() => {
                    el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                    el.style.opacity = 1;
                    el.style.transform = 'translateY(0)';
                }, i * 100 + 60);
            });
        }

        // Auto-advance every 4s
        setInterval(() => goToSlide((current + 1) % total), 4000);
    </script>
