<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Affiliated With – Indo Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <section class="aff-section">

        <!-- Title -->
        <h2 class="aff-section-title" id="stitle">Affiliated With</h2>

        <!-- 3 Cards -->
        <div class="aff-cards-track" id="track">

            <!-- Card 1 – PTU -->
            <div class="aff-card" id="ac1">
                <div class="aff-logo-area">
                    <img src="https://igef.net/info/engineering/images_webp/logo1-(3).webp"
                        alt="Punjab Technical University" />
                </div>
                <p class="aff-card-desc">I.K. Gujral Punjab Technical University, Kapurthala</p>
            </div>

            <!-- Card 2 – AICTE -->
            <div class="aff-card" id="ac2">
                <div class="aff-logo-area">
                    <img src="https://igef.net/info/engineering/images_webp/logo4.webp" alt="AICTE" />
                </div>
                <p class="aff-card-desc">All India Council for Technical Education, New Delhi</p>
            </div>

            <!-- Card 3 – Council of Architecture -->
            <div class="aff-card" id="ac3">
                <div class="aff-logo-area">
                    <img src="https://igef.net/info/engineering/images_webp/logo3%20(1).webp"
                        alt="Council of Architecture" />
                </div>
                <p class="aff-card-desc">Council of Architecture, New Delhi</p>
            </div>

        </div>

        <!-- Nav arrows -->

    </section>

    <style>
        /* ── Section ── */
        .aff-section {
            padding: 4rem 2rem;
            background: #fff;
            overflow: hidden;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            box-sizing: border-box;
        }

        /* ── Title ── */
        .aff-section-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(16px);
        }

        /* ── Scrollable row ── */
        .aff-cards-track {
            display: flex;
            gap: 1.5rem;
            padding-bottom: 1rem;
            padding-right: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ── Individual card ── */
        .aff-card {
            position: relative;
            flex-shrink: 0;
            width: 240px;
            background: #fff;
            border: 1.5px solid #e5e7eb;
            border-radius: 16px;
            padding: 2rem 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            opacity: 0;
            transform: translateY(24px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: default;
            overflow: hidden;
            box-sizing: border-box;
        }

        .aff-card:hover {
            transform: translateY(-6px) !important;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.10);
            border-color: rgba(122, 21, 21, 0.25);
        }

        /* ── Ribbon badge (top-center) ── */
        .aff-ribbon {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: #8B1A1A;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.3rem 1rem 0.5rem;
            white-space: nowrap;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 50% 100%, 0 75%);
            min-width: 90px;
            text-align: center;
            z-index: 2;
        }

        /* ── Logo area ── */
        .aff-logo-area {
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }

        .aff-logo-area img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: transform 0.3s ease;
        }

        .aff-card:hover .aff-logo-area img {
            transform: scale(1.06);
        }

        /* ── Description ── */
        .aff-card-desc {
            font-size: 0.82rem;
            color: #4b5563;
            line-height: 1.6;
            font-weight: 400;
            margin-top: auto;
        }

        /* ── No-ribbon spacer ── */
        .aff-ribbon-spacer {
            height: 2px;
        }

        /* Nav arrows */
        .aff-nav-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 2rem;
            padding-right: 2rem;
            justify-content: flex-end;
            opacity: 0;
        }

        .aff-nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #6b7280;
        }

        .aff-nav-btn:hover {
            border-color: #8B1A1A;
            color: #8B1A1A;
            background: #fff5f5;
        }

        .aff-nav-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
    </style>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        const affSt = { trigger: '.aff-section', start: 'top 80%', once: true };

        gsap.to('#stitle', { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out', scrollTrigger: affSt });

        ['ac1', 'ac2', 'ac3'].forEach((id, i) => {
            gsap.to(`#${id}`, {
                opacity: 1, y: 0,
                duration: 0.55,
                ease: 'back.out(1.3)',
                delay: i * 0.13 + 0.25,
                scrollTrigger: affSt
            });
        });
    </script>

</body>

</html>
